  <rect x="148" y="125" width="50" height="50" rx="4" fill="#ff6600" transform="rotate(-12 173 150)"/>
  <rect x="148" y="185" width="95" height="8" rx="4" fill="#ccc" transform="rotate(-12 195 189)"/>
  <rect x="148" y="202" width="85" height="8" rx="4" fill="#ccc" transform="rotate(-12 190 206)"/>
  <rect x="148" y="219" width="90" height="8" rx="4" fill="#ccc" transform="rotate(-12 193 223)"/>
  <!-- Chat bubble (top-right) -->
  <circle cx="355" cy="145" r="55" fill="white"/>
  <circle cx="335" cy="145" r="8" fill="#ff6600"/>
  <circle cx="358" cy="145" r="8" fill="#ff6600"/>
  <circle cx="381" cy="145" r="8" fill="#ff6600"/>
