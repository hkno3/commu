name: Fetch News and Deploy

on:
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Download data files from server
        run: |
          python - <<'EOF'
          import ftplib, os, json

          HOST = "ftp.bizachieve.com"
          USER = "newscommu@newscommu.com"
          PASS = "${{ secrets.FTP_PASSWORD }}"
          FILES = ["data/published.json", "data/latest.json"]

          os.makedirs("data", exist_ok=True)

          try:
              ftp = ftplib.FTP(HOST)
              ftp.login(USER, PASS)
              for f in FILES:
                  try:
                      with open(f, "wb") as fp:
                          ftp.retrbinary(f"RETR {f}", fp.write)
                      print(f"Downloaded: {f}")
                  except Exception as e:
                      print(f"Skip {f}: {e}")
              # Download category json files
              try:
                  ftp.cwd("data")
                  files = ftp.nlst()
                  ftp.cwd("..")
                  for fname in files:
                      if fname.endswith(".json") and fname not in ["published.json", "latest.json"]:
                          local = f"data/{fname}"
                          try:
                              with open(local, "wb") as fp:
                                  ftp.retrbinary(f"RETR data/{fname}", fp.write)
                              print(f"Downloaded: data/{fname}")
                          except Exception as e:
                              print(f"Skip data/{fname}: {e}")
              except Exception as e:
                  print(f"data dir error: {e}")
              ftp.quit()
          except Exception as e:
              print(f"FTP error: {e}")
          EOF

      - name: Fetch and rewrite news
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          python .github/workflows/fetch_news.py

      - name: Deploy to FastComet via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.bizachieve.com
          username: newscommu@newscommu.com
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/__pycache__/**
            .github/workflows/fetch_news.py
            README.md
            assets/images/favicon.png
