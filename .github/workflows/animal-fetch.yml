name: Fetch Animal Papers and Deploy

on:
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Download data files from server
        run: |
          python - <<'EOF'
          import ftplib, os

          HOST = "ftp.bizachieve.com"
          USER = "newscommu@newscommu.com"
          PASS = "${{ secrets.FTP_PASSWORD }}"

          os.makedirs("data", exist_ok=True)

          try:
              ftp = ftplib.FTP(HOST)
              ftp.login(USER, PASS)
              # Download all data/*.json files to preserve existing category files
              try:
                  ftp.cwd("data")
                  files = ftp.nlst()
                  ftp.cwd("..")
                  for fname in files:
                      if fname.endswith(".json"):
                          local = f"data/{fname}"
                          try:
                              with open(local, "wb") as fp:
                                  ftp.retrbinary(f"RETR data/{fname}", fp.write)
                              print(f"Downloaded: {local}")
                          except Exception as e:
                              print(f"Skip {local}: {e}")
              except Exception as e:
                  print(f"data dir error: {e}")
              ftp.quit()
          except Exception as e:
              print(f"FTP error: {e}")
          EOF

      - name: Fetch PubMed papers and rewrite
        env:
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SAVE_SECRET: ${{ secrets.SAVE_SECRET }}
        run: |
          python .github/workflows/fetch_animal.py

      - name: Deploy to FastComet via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.bizachieve.com
          username: newscommu@newscommu.com
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/__pycache__/**
            .github/workflows/fetch_animal.py
            .github/workflows/fetch_news.py
            .github/workflows/fetch_weekly.py
            README.md
            assets/images/favicon.png
            rss.xml
            sitemap.xml

      - name: Save article to DB via API (after FTP deploy)
        env:
          SAVE_SECRET: ${{ secrets.SAVE_SECRET }}
        run: |
          python - <<'EOF'
          import json, os, requests, time

          path = "/tmp/animal_new_article.json"
          if not os.path.exists(path):
              print("DB 저장 대상 없음 (새 글 없음)")
              exit(0)

          with open(path, encoding="utf-8") as f:
              article = json.load(f)

          SAVE_SECRET = os.environ.get("SAVE_SECRET", "")
          SAVE_API_URL = "https://newscommu.com/api/save_article.php"

          try:
              r = requests.post(
                  SAVE_API_URL,
                  json=article,
                  headers={"X-Save-Secret": SAVE_SECRET, "Content-Type": "application/json"},
                  timeout=15,
              )
              if r.status_code == 200:
                  print(f"  [DB] 저장 완료: {article.get('article_id','')[:20]}")
              else:
                  print(f"  [DB] 저장 실패: {r.status_code} {r.text[:200]}")
          except Exception as e:
              print(f"  [DB] 저장 실패 (무시): {e}")
          EOF
